<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petmatch - Estructuras de Datos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between;}
        .card h3 { margin: 10px 0 5px; color: #3498db; font-size: 1.2em;}
        .card p.codigo { color: #e74c3c; font-weight: bold; font-size: 0.9em; margin: 0 0 10px 0; font-family: monospace;}
        .card p.precio { font-weight: bold; font-size: 1.4em; color: #27ae60; margin: 10px 0;}
        .card button { background-color: #3498db; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold;}
        .card button:hover { background-color: #2980b9; }
        
        .carrito { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #ecf0f1; padding: 12px 0; }
        #total-carrito { font-size: 1.8em; font-weight: bold; text-align: right; margin-top: 20px; color: #27ae60; }
    </style>
</head>
<body>

    <header>
        <h1>🐾 Petmatch: E-commerce IA</h1>
        <p>Implementación de Archivo Secuencial y Claves Estructuradas</p>
    </header>

    <h2>Categoría: Alimentos</h2>
    <div class="grid" id="cat-alimentos"></div>

    <h2>Categoría: Accesorios y Salud</h2>
    <div class="grid" id="cat-accesorios"></div>

    <h2>Categoría: Servicios</h2>
    <div class="grid" id="cat-servicios"></div>

    <div class="carrito">
        <h2>🛒 Carrito de Compras</h2>
        <div id="lista-carrito">El archivo temporal del carrito está vacío.</div>
        <div id="total-carrito">Total: $0.00</div>
    </div>

    <script>
        /* ========================================================================
            DEFINICIÓN DEL ARCHIVO SECUENCIAL Y REGISTROS
            Estructura del Registro: 
            - Cod_Prod       : AN(6) -> Clave Principal (2 Fam. + 4 Secuenciales)
            - Nombre         : AN(40)
            - Tipo_Articulo  : Entero (1=Alimentos, 2=Accesorios, 3=Servicios)
            - Precio_Unitario: Real
            - Perfil_IA      : AN(30)
            
            Justificación del ordenamiento físico:
            Los registros se encuentran ordenados físicamente por su clave Cod_Prod. 
            Al agrupar por familia (AL, AC, SV), la secuencia permite aplicar de manera 
            directa y eficiente algoritmos de Corte de Control en el procesamiento.
         ======================================================================== */
        const arch_maestro = [
            // Tipo_Articulo 1: Alimentos (Clave ALxxxx)
            { Cod_Prod: 'AL0001', Nombre: 'Alimento Premium Perro 15kg', Tipo_Articulo: 1, Precio_Unitario: 45000.00, Perfil_IA: 'Nutrición, Adulto, Mordida grande' },
            { Cod_Prod: 'AL0002', Nombre: 'Alimento Control Peso Gato 3kg', Tipo_Articulo: 1, Precio_Unitario: 18000.00, Perfil_IA: 'Indoor, Castrado, Dieta' },
            
            // Tipo_Articulo 2: Accesorios, Higiene y Salud (Clave ACxxxx)
            { Cod_Prod: 'AC0001', Nombre: 'Shampoo Hipoalergénico', Tipo_Articulo: 2, Precio_Unitario: 8500.50, Perfil_IA: 'Piel sensible, Baño, Avena' },
            { Cod_Prod: 'AC0002', Nombre: 'Arena Sanitaria Aglomerante', Tipo_Articulo: 2, Precio_Unitario: 12000.00, Perfil_IA: 'Higiene, Lavanda, Sin polvo' },
            { Cod_Prod: 'AC0003', Nombre: 'Antiparasitario Masticable Perro', Tipo_Articulo: 2, Precio_Unitario: 15000.00, Perfil_IA: 'Prevención, Pulgas, Garrapatas' },
            
            // Tipo_Articulo 3: Servicios Clínicos/Estéticos (Clave SVxxxx)
            { Cod_Prod: 'SV0001', Nombre: 'Baño y Peluquería Canina/Felina', Tipo_Articulo: 3, Precio_Unitario: 15000.00, Perfil_IA: 'Estética, Corte, Secado' },
            { Cod_Prod: 'SV0002', Nombre: 'Análisis de Sangre Completo', Tipo_Articulo: 3, Precio_Unitario: 35000.00, Perfil_IA: 'Laboratorio, Diagnóstico, Clínico' }
        ];

        let arch_temporal_carrito = []; 

        /* ========================================================================
            SIMULACIÓN DE LECTURA SECUENCIAL Y CORTE POR CATEGORÍA
         ======================================================================== */
        function cargarCatalogo() {
            const divAlimentos = document.getElementById('cat-alimentos');
            const divAccesorios = document.getElementById('cat-accesorios');
            const divServicios = document.getElementById('cat-servicios');

            arch_maestro.forEach(reg => {
                const tarjetaHtml = `
                    <div class="card">
                        <div>
                            <h3>${reg.Nombre}</h3>
                            <p class="codigo">Clave: ${reg.Cod_Prod}</p>
                        </div>
                        <div>
                            <p class="precio">$${reg.Precio_Unitario.toLocaleString('es-AR')}</p>
                            <button onclick="agregarAlCarrito('${reg.Cod_Prod}')">Sumar al Carrito</button>
                        </div>
                    </div>
                `;

                // Clasificamos según el campo Tipo_Articulo
                if (reg.Tipo_Articulo === 1) divAlimentos.innerHTML += tarjetaHtml;
                else if (reg.Tipo_Articulo === 2) divAccesorios.innerHTML += tarjetaHtml;
                else if (reg.Tipo_Articulo === 3) divServicios.innerHTML += tarjetaHtml;
            });
        }

        /* ========================================================================
            ALGORITMO DE BÚSQUEDA POR CLAVE (Cod_Prod)
         ======================================================================== */
        function agregarAlCarrito(claveBuscada) {
            const regEncontrado = arch_maestro.find(reg => reg.Cod_Prod === claveBuscada);
            
            if (regEncontrado) {
                arch_temporal_carrito.push(regEncontrado);
                actualizarInterfazCarrito();
            }
        }

        function actualizarInterfazCarrito() {
            const divLista = document.getElementById('lista-carrito');
            const divTotal = document.getElementById('total-carrito');
            
            if (arch_temporal_carrito.length === 0) return;

            divLista.innerHTML = ""; 
            let total_acumulado = 0.0;

            arch_temporal_carrito.forEach(reg => {
                total_acumulado += reg.Precio_Unitario;
                divLista.innerHTML += `
                    <div class="item-carrito">
                        <span><strong>[${reg.Cod_Prod}]</strong> - ${reg.Nombre}</span>
                        <span>$${reg.Precio_Unitario.toLocaleString('es-AR')}</span>
                    </div>
                `;
            });

            divTotal.innerHTML = `Total: $${total_acumulado.toLocaleString('es-AR')}`;
        }

        // Iniciar la lectura del archivo al abrir la página
        cargarCatalogo();
    </script>
</body>
</html>
